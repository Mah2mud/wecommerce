<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeCoMMerce — تم الحجز بنجاح</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <div>We<span>CoMMerce</span></div>
    </div>
  </nav>

  <!-- Thank You -->
  <section class="thankyou-section">

    <div class="success-icon"></div>

    <h1 id="ty-title">تم الحجز بنجاح</h1>
    <p class="msg">
      فريقنا سيتواصل معك قريباً لتأكيد الموعد.<br>
      نتطلع إلى مساعدتك في تطوير متجرك.
    </p>

    <div class="booking-details-card">
      <h3>تفاصيل الموعد</h3>
      <div class="detail-row">
        <span class="d-label">الاسم</span>
        <span class="d-value" id="ty-name">-</span>
      </div>
      <div class="detail-row">
        <span class="d-label">البريد</span>
        <span class="d-value" id="ty-email">-</span>
      </div>
      <div class="detail-row">
        <span class="d-label">التاريخ</span>
        <span class="d-value" id="ty-date">-</span>
      </div>
      <div class="detail-row">
        <span class="d-label">الوقت</span>
        <span class="d-value" id="ty-time">-</span>
      </div>
    </div>

    <div class="email-note">
      سيصلك تأكيد الموعد على بريدك الإلكتروني خلال دقائق
    </div>

    <button class="btn btn-primary" onclick="goHome()">
      العودة للصفحة الرئيسية
    </button>

  </section>

  <script src="/js/thankyou.js"></script>
</body>
</html>
