<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeCoMMerce — استراتيجيتك المخصصة</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <div>We<span>CoMMerce</span></div>
    </div>
  </nav>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-steps">
      <div class="step done">
        <div class="step-circle"></div>
        <div class="step-label">التسجيل</div>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-circle">2</div>
        <div class="step-label">الفيديو</div>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">الاستبيان</div>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">4</div>
        <div class="step-label">الحجز</div>
      </div>
    </div>
  </div>

  <!-- Video -->
  <section class="video-section">
    <span class="section-tag">الخطوة الثانية</span>
    <h2>استراتيجيتك المخصصة</h2>
    <p class="desc">شاهد الفيديو لتكتشف كيف سنساعدك في بناء نظام مبيعات قابل للقياس والتوسع</p>

    <div class="video-placeholder">
      <div class="video-play-icon">&#9654;</div>
      <p class="video-placeholder-text">فيديو الاستراتيجية يتم تجهيزه خصيصاً لك</p>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="video-note">
      سيتم إضافة الفيديو قريباً، يمكنك المتابعة لحجز استشارتك المجانية الآن
    </div>

    <button class="btn btn-primary" id="skip-btn" onclick="skipVideo()">
      <span class="btn-text">المتابعة لحجز الاستشارة</span>
      <span class="spinner"></span>
    </button>
  </section>

  <div class="toast" id="toast"></div>
  <script src="/js/video.js"></script>
</body>
</html>
